name: 'Canvas Rendering Pipeline (Epic 018)'
url: 'http://localhost:3000'
description: >
  Canvas2D rendering pipeline: sky, terrain, tanks, HUD, game loop.

cases:
  - id: '018.2-sky-gradient'
    given: 'The game page is loaded'
    when: 'I look at the top portion of the canvas'
    then: 'A multi-color gradient is visible, transitioning from dark purple/blue at top to warm orange/sandy at bottom'

  - id: '018.3-terrain-polygon'
    given: 'The game page is loaded'
    when: 'I look at the lower portion of the canvas'
    then: 'A green mountainous landscape is drawn as a filled polygon with an irregular height profile'

  - id: '018.3-terrain-stroke'
    given: 'Terrain is visible on the canvas'
    when: 'I look at the top edge of the terrain'
    then: 'A darker stroke/outline is visible along the terrain surface'

  - id: '018.4-tanks-present'
    given: 'The game page is loaded'
    when: 'I examine the terrain'
    then: 'Two tank objects are visible: a red one on the left side and a blue one on the right side'

  - id: '018.4-tanks-on-terrain'
    given: 'Both tanks are visible'
    when: 'I check their vertical position'
    then: 'The tanks are sitting directly on the terrain surface, not floating above or buried below'

  - id: '018.4-tanks-facing'
    given: 'Both tanks are visible'
    when: 'I look at their barrel/gun orientation'
    then: "The red tank's barrel points rightward and the blue tank's barrel points leftward (facing each other)"

  - id: '018.4-tank-body'
    given: 'A tank is visible'
    when: 'I examine its shape'
    then: 'The tank has a rectangular body, a dome-shaped turret on top, and a barrel line extending from the turret'

  - id: '018.1-hud-visible'
    given: 'The game page is loaded'
    when: 'I look at the top-left area'
    then: 'A semi-transparent dark HUD panel is overlaid on the canvas'

  - id: '018.1-hud-fields'
    given: 'The HUD panel is visible'
    when: 'I read its contents'
    then: 'It shows labeled fields for Player name, Angle (with °), Power (with %), Wind (with → or ←), and Weapon name'

  - id: '018.1-game-loop'
    given: 'The game page is loaded'
    when: 'I observe the page for a few seconds'
    then: 'The page feels responsive and the canvas is being actively redrawn (animation loop running)'
